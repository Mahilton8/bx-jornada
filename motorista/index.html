<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BX Jornada вҖ” Apontamento do Motorista</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --navy-deep:#03070F; --navy:#0B1225; --teal:#00E5C8; --green:#39FF7E;
    --gold:#FFD166; --red:#FF4D6D; --text:#E9EDF5; --text-dim:#8B93A7;
    --card:#0F1830; --card-border:#1C2848;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:radial-gradient(circle at 50% 0%, var(--navy) 0%, var(--navy-deep) 65%); color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; padding-bottom:24px;}

  header{padding:18px 20px 14px; text-align:center; border-bottom:1px solid var(--card-border);}
  header .brand{font-size:11px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase;}
  header h1{margin:4px 0 0; font-size:20px; font-weight:800;}
  header h1 span{color:var(--teal);}

  /* Tela de identificaГ§ГЈo */
  #tela-login{max-width:420px; margin:40px auto; padding:0 20px; text-align:center;}
  #tela-login p{color:var(--text-dim); font-size:14px; line-height:1.5;}
  .input-cartao{width:100%; padding:16px; font-size:20px; text-align:center; letter-spacing:2px;
    background:var(--card); border:1px solid var(--card-border); border-radius:12px; color:var(--text); margin-top:16px;}
  .input-cartao:focus{outline:none; border-color:var(--teal);}
  .btn-primary{width:100%; margin-top:14px; padding:16px; font-size:16px; font-weight:700; border:none; border-radius:12px;
    background:linear-gradient(135deg, var(--teal), #00B8A3); color:var(--navy-deep); cursor:pointer;}
  .btn-primary:active{transform:scale(.98);}
  .erro-msg{color:var(--red); font-size:13px; margin-top:10px; min-height:16px;}

  /* Tela principal */
  #tela-macros{display:none; max-width:520px; margin:0 auto; padding:16px 16px 40px;}
  .status-motorista{background:var(--card); border:1px solid var(--card-border); border-radius:14px; padding:14px 16px; margin-bottom:16px;
    display:flex; justify-content:space-between; align-items:center;}
  .status-motorista .nome{font-weight:700; font-size:15px;}
  .status-motorista .veic{color:var(--text-dim); font-size:12px; margin-top:2px;}
  .status-motorista .sair{color:var(--text-dim); font-size:12px; text-decoration:underline; cursor:pointer;}

  .status-atual{background:linear-gradient(135deg, rgba(0,229,200,.12), rgba(0,229,200,.02)); border:1px solid rgba(0,229,200,.35);
    border-radius:14px; padding:14px 16px; margin-bottom:18px;}
  .status-atual .label{font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--teal);}
  .status-atual .valor{font-size:18px; font-weight:800; margin-top:4px;}
  .status-atual .hora{font-size:12px; color:var(--text-dim); margin-top:2px;}

  .grid-macros{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .macro-btn{background:var(--card); border:1px solid var(--card-border); border-radius:14px; padding:16px 10px;
    display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; transition:.15s; color:var(--text);}
  .macro-btn:active{transform:scale(.96); border-color:var(--teal);}
  .macro-btn .icone{font-size:26px;}
  .macro-btn .nome{font-size:12.5px; font-weight:700; text-align:center; line-height:1.25;}
  .macro-btn.mov{border-top:3px solid var(--green);}
  .macro-btn.parado{border-top:3px solid var(--gold);}
  .macro-btn.descanso{border-top:3px solid var(--teal);}
  .macro-btn.fim{border-top:3px solid var(--red); background:rgba(255,77,109,.08);}

  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--green); color:var(--navy-deep); font-weight:800; padding:14px 22px; border-radius:12px;
    transition:.25s; pointer-events:none; z-index:50; box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.erro{background:var(--red); color:#fff;}

  .overlay{position:fixed; inset:0; background:rgba(3,7,15,.85); display:none; align-items:center; justify-content:center; z-index:40; padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:var(--card); border:1px solid var(--card-border); border-radius:16px; padding:20px; max-width:360px; width:100%;}
  .modal h3{margin:0 0 12px; font-size:15px;}
  .modal select, .modal textarea{width:100%; padding:12px; border-radius:10px; border:1px solid var(--card-border); background:var(--navy);
    color:var(--text); margin-bottom:12px; font-size:14px;}
  .modal .acoes{display:flex; gap:10px;}
  .modal .acoes button{flex:1; padding:12px; border-radius:10px; border:none; font-weight:700; cursor:pointer;}
  .modal .cancelar{background:transparent; border:1px solid var(--card-border) !important; color:var(--text-dim);}
  .modal .confirmar{background:var(--teal); color:var(--navy-deep);}

  footer{text-align:center; color:var(--text-dim); font-size:11px; margin-top:20px;}
</style>
</head>
<body>

<header>
  <div class="brand">TRANSPORTADORA BARRA XINGU</div>
  <h1>BX <span>Jornada</span> вҖ” Apontamento</h1>
</header>

<!-- TELA DE LOGIN -->
<div id="tela-login">
  <p>Entre com seu primeiro nome e senha (CPF) para iniciar o apontamento da jornada.</p>
  <input type="text" id="input-nome" class="input-cartao" placeholder="Primeiro nome" autocapitalize="words" autofocus>
  <input type="password" id="input-senha" class="input-cartao" placeholder="Senha (CPF)" inputmode="numeric" style="margin-top:10px;">
  <button class="btn-primary" onclick="identificar()">Entrar</button>
  <div class="erro-msg" id="erro-login"></div>
</div>

<!-- TELA DE MACROS -->
<div id="tela-macros">
  <div class="status-motorista">
    <div>
      <div class="nome" id="nome-motorista">вҖ”</div>
      <div class="veic" id="veiculo-motorista">вҖ”</div>
    </div>
    <div class="sair" onclick="sair()">Trocar motorista</div>
  </div>

  <div class="status-atual">
    <div class="label">Atividade atual</div>
    <div class="valor" id="atividade-atual">Nenhum apontamento hoje</div>
    <div class="hora" id="hora-atual">вҖ”</div>
  </div>

  <div class="grid-macros" id="grid-macros"></div>
</div>

<footer>Em caso de dГәvida, procure seu gestor ou o responsГЎvel da empresa.</footer>

<div class="overlay" id="overlay-motivo">
  <div class="modal">
    <h3 id="titulo-modal">Motivo da parada</h3>
    <select id="select-motivo">
      <option>Fim de expediente</option>
      <option>Pane mecГўnica</option>
      <option>Pernoite</option>
      <option>FiscalizaГ§ГЈo</option>
      <option>Outro</option>
    </select>
    <textarea id="obs-modal" rows="2" placeholder="ObservaГ§ГЈo (opcional)"></textarea>
    <div class="acoes">
      <button class="cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="confirmar" onclick="confirmarModal()">Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// вҡ пёҸ Cole aqui a URL do Web App do Apps Script (mesma base usada no Painel Administrativo)
const API_URL = 'https://script.google.com/macros/s/AKfycbwOM5W_UVMx8QjcXiZ3ga237ckePoi-XgA45rQqzew6nel16V80eI3KMcEs5Xp010NmPQ/exec';

const ICONES = {
  '1':'рҹҹў','2':'вҶ©пёҸ','3':'рҹ”§','4':'рҹ“Ұ','5':'рҹ“Ө','6':'вҸұпёҸ',
  '7':'вӣҪ','8':'рҹҚҪпёҸ','9':'рҹӣҢ','*':'рҹҡҰ','0':'рҹҸҒ','#':'рҹҡ“'
};

let motoristaAtual = null;
let macroPendente = null;

function toast(msg, erro=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (erro ? ' erro' : '');
  setTimeout(()=> t.className='toast', 2500);
}

async function chamar(action, params={}, method='GET', body=null){
  try{
    if(method==='GET'){
      const qs = new URLSearchParams({action, ...params}).toString();
      const r = await fetch(`${API_URL}?${qs}`);
      return await r.json();
    } else {
      const r = await fetch(API_URL, {method:'POST', body: JSON.stringify({action, ...body})});
      return await r.json();
    }
  }catch(e){
    return {erro:'Falha de conexГЈo. Verifique a internet.'};
  }
}

async function identificar(){
  const nome = document.getElementById('input-nome').value.trim();
  const senha = document.getElementById('input-senha').value.trim();
  const erroEl = document.getElementById('erro-login');
  erroEl.textContent = '';
  if(!nome || !senha){ erroEl.textContent = 'Preencha nome e senha.'; return; }
  const res = await chamar('login', {nome, senha});
  if(res.erro){ erroEl.textContent = res.erro; return; }
  motoristaAtual = res;
  localStorage.setItem('bx_motorista', JSON.stringify(res));
  entrarPainel();
}

function entrarPainel(){
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('tela-macros').style.display = 'block';
  document.getElementById('nome-motorista').textContent = motoristaAtual.nome;
  document.getElementById('veiculo-motorista').textContent = motoristaAtual.veiculo ? `VeГӯculo: ${motoristaAtual.veiculo}` : 'Sem veГӯculo vinculado';
  montarGrid();
  atualizarStatus();
}

function sair(){
  motoristaAtual = null;
  localStorage.removeItem('bx_motorista');
  document.getElementById('tela-macros').style.display = 'none';
  document.getElementById('tela-login').style.display = 'block';
  document.getElementById('input-nome').value = '';
  document.getElementById('input-senha').value = '';
}

function montarGrid(){
  const grid = document.getElementById('grid-macros');
  const macros = [
    {id:'1',nome:'InГӯcio de viagem',tipo:'movimento'},{id:'2',nome:'Manobra',tipo:'movimento'},
    {id:'3',nome:'ManutenГ§ГЈo',tipo:'parado'},{id:'4',nome:'Carga',tipo:'parado'},
    {id:'5',nome:'Descarga',tipo:'parado'},{id:'6',nome:'Espera',tipo:'parado'},
    {id:'7',nome:'Abastecimento',tipo:'parado'},{id:'8',nome:'RefeiГ§ГЈo',tipo:'descanso'},
    {id:'9',nome:'Descanso',tipo:'descanso'},{id:'*',nome:'TrГўnsito parado',tipo:'parado'},
    {id:'0',nome:'Fim de jornada',tipo:'fim'},{id:'#',nome:'PolГӯcia',tipo:'parado'}
  ];
  grid.innerHTML = macros.map(m => `
    <div class="macro-btn ${m.tipo==='movimento'?'mov':m.tipo}" onclick="selecionarMacro('${m.id}','${m.nome}')">
      <div class="icone">${ICONES[m.id]}</div>
      <div class="nome">${m.id}. ${m.nome}</div>
    </div>`).join('');
}

function selecionarMacro(id, nome){
  if(id === '0' || id === '3' || id === '*'){
    macroPendente = {id, nome};
    document.getElementById('titulo-modal').textContent = id==='0' ? 'Motivo do fim de jornada' : `Detalhar: ${nome}`;
    document.getElementById('overlay-motivo').classList.add('show');
    return;
  }
  registrar(id, nome, '', '');
}

function fecharModal(){ document.getElementById('overlay-motivo').classList.remove('show'); macroPendente=null; }

function confirmarModal(){
  const motivo = document.getElementById('select-motivo').value;
  const obs = document.getElementById('obs-modal').value;
  registrar(macroPendente.id, macroPendente.nome, obs, motivo);
  document.getElementById('overlay-motivo').classList.remove('show');
  document.getElementById('obs-modal').value = '';
}

async function registrar(macroId, macroNome, observacao, motivo){
  toast('Registrando...');
  const res = await chamar('registrarApontamento', {}, 'POST', {
    motoristaId: motoristaAtual.id,
    motoristaNome: motoristaAtual.nome,
    veiculo: motoristaAtual.veiculo,
    macroId, observacao, motivoParada: motivo
  });
  if(res.erro){ toast(res.erro, true); return; }
  toast(`вң” ${macroNome} registrado`);
  atualizarStatus();
}

async function atualizarStatus(){
  const res = await chamar('statusAtualMotorista', {motoristaId: motoristaAtual.id});
  if(res.macroNome){
    document.getElementById('atividade-atual').textContent = `${res.macroId}. ${res.macroNome}`;
    document.getElementById('hora-atual').textContent = 'Desde ' + new Date(res.dataHora).toLocaleString('pt-BR');
  }
}

// restaura sessГЈo local
window.onload = () => {
  const salvo = localStorage.getItem('bx_motorista');
  if(salvo){ motoristaAtual = JSON.parse(salvo); entrarPainel(); }
};
</script>
</body>
</html>
